services:
  web:
    build:
      context: .
      dockerfile: Containerfile
    image: ghcr.io/nikolyabb/library-app:latest
    env_file: .env
    volumes:
      - library-data:/app/data
      - library-static:/app/staticfiles
    expose:
      - "8000"

  nginx:
    image: docker.io/nginx:alpine
    ports:
      - "8000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - library-static:/app/staticfiles:ro
    depends_on:
      - web

volumes:
  library-data:
  library-static:
